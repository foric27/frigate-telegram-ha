        %}{% endfor %} {% else %}–Њ–±—К–µ–Ї—В –љ–µ –Њ–±–љ–∞—А—Г–ґ–µ–љрЯЪЂ{% endif %} {% if audio |
        length > 0 %} \(–Ј–≤—Г–Ї\: {% for sound in audio %}{{ audio_object[sound] |
        default('–љ–µ–Є–Ј–≤–µ—Б—В–љ—Л–є –Ј–≤—Г–ЇрЯФК') }}{% if not loop.last %}, {% endif %}{%
        endfor %}\) {% endif %} *{{ camera_name[camera] | default(camera) }}* {% if end_time %}
        \(–њ—А–Њ–і–Њ–ї–ґ–Є—В–µ–ї—М–љ–Њ—Б—В—М\: {{ (end_time - start_time) | int }} —Б–µ–Ї\.\) {%
        endif %}
  - alias: NEW
    if:
      - alias: NEW ?
        condition: template
        value_template: "{{ type == 'new' }}"
    then:
      - continue_on_error: true
        action: telegram_bot.send_photo
        data:
          caption: "{{ message_template }}"
          parse_mode: markdownv2
          url: >-
            {{ frigate_base_url }}/api/events/{{ id_data
            }}/snapshot.jpg?timestamp=1&bbox=1&crop=1&quality=90
          chat_id:
            - "442672175"
            - "2058806977"
          verify_ssl: false
          config_entry_id: 01JZ7YKVZC1Z731645G07F76FN
  - alias: UPDATE
    if:
      - alias: UPDATE ?
        condition: template
        value_template: "{{ type == 'update' }}"
    then:
      - continue_on_error: true
        action: telegram_bot.send_photo
        data:
          caption: "{{ message_template }}"
          parse_mode: markdownv2
          url: >-
            {{ frigate_base_url }}/api/events/{{ id_data
            }}/snapshot.jpg?timestamp=1&bbox=1&crop=1&quality=90
          chat_id:
            - "442672175"
            - "2058806977"
          verify_ssl: false
          config_entry_id: 01JZ7YKVZC1Z731645G07F76FN
    enabled: false
  - alias: END
    if:
      - alias: END ?
        condition: template
        value_template: "{{ type == 'end' }}"
    then:
      - continue_on_error: true
        action: telegram_bot.send_animation
        data:
          caption: "{{ message_template }}"
          parse_mode: markdownv2
          url: >-
            {{ frigate_base_url }}/api/{{ camera }}/start/{{ start_time
            }}/end/{{ end_time }}/preview.gif
          inline_keyboard: >-
            рЯУЉ –Т–Є–і–µ–Њ:/send_video {{ camera }} {{ start_time }} {{ end_time }},
            рЯУЄ –§–Њ—В–Њ:/send_snapshot {{ id_data }}
          chat_id:
            - 442672175
            - 2058806977
          config_entry_id: 01JZ7YKVZC1Z731645G07F76FN
          verify_ssl: false
mode: parallel
max: 20
max_exceeded: silent
