alias: Frigate Motion Alert to Telegram new 2
description: –Р–≤—В–Њ–Љ–∞—В–Є–Ј–∞—Ж–Є—П –і–ї—П –Њ—В–њ—А–∞–≤–Ї–Є —Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є–є –Є–Ј Frigate –≤ Telegram.
triggers:
