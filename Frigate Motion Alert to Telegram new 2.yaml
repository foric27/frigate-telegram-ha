    options:
      topic: frigate/reviews
conditions:
  - condition: template
    value_template: >-
      {{ trigger.payload_json['after']['camera'] in
         ['cam_1', 'cam_2', 'cam_3', 'cam_4', 'cam_5', 'cam_6'] }}
