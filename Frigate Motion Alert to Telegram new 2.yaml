        face: –ї–Є—Ж–ЊрЯІС
        car: –Љ–∞—И–Є–љ–∞рЯЪЧ
        motorcycle: –Љ–Њ—В–Њ—Ж–Є–Ї–їрЯПНпЄП
        bicycle: –≤–µ–ї–Њ—Б–Є–њ–µ–ірЯЪ≤
        boat: –ї–Њ–і–Ї–∞рЯЪ§
        license_plate: –љ–Њ–Љ–µ—А–љ–Њ–є –Ј–љ–∞–ЇрЯУЫ
        dog: —Б–Њ–±–∞–Ї–∞рЯРґ
        cat: –Ї–Њ—ВрЯР±
        deer: –Њ–ї–µ–љ—МрЯ¶М
        horse: –ї–Њ—И–∞–і—МрЯРі
        bird: –њ—В–Є—Ж–∞рЯР¶
        raccoon: –µ–љ–Њ—ВрЯ¶Э
        fox: –ї–Є—Б–∞рЯ¶К
        bear: –Љ–µ–і–≤–µ–і—МрЯРї
        cow: –Ї–Њ—А–Њ–≤–∞рЯРД
        squirrel: –±–µ–ї–Ї–∞рЯРњпЄП
        goat: –Ї–Њ–Ј–∞рЯРР
        rabbit: –Ї—А–Њ–ї–Є–ЇрЯРЗ
        package: –њ–Њ—Б—Л–ї–Ї–∞рЯУ¶
        waste_bin: –Љ—Г—Б–Њ—А–љ—Л–є –±–∞–ЇрЯЧСпЄП
        bbq_grill: –≥—А–Є–ї—МрЯНЦ
        robot_lawnmower: –≥–∞–Ј–Њ–љ–Њ–Ї–Њ—Б–Є–ї–Ї–∞-—А–Њ–±–Њ—ВрЯ§Ц
        umbrella: –Ј–Њ–љ—ВвШВпЄП
      camera_name:
        cam_1: –і–≤–Њ—А
        cam_2: –Њ–≥–Њ—А–Њ–і
        cam_3: —Г–ї–Є—Ж–∞
        cam_4: —Г–ї–Є—Ж–∞ 2
        cam_5: –Њ–≥–Њ—А–Њ–і 2
        cam_6: –≥–∞—А–∞–ґ
      audio_object:
        bark: –Ы–∞–є —Б–Њ–±–∞–Ї–Є рЯРґ
        fire_alarm: –Я–Њ–ґ–∞—А–љ–∞—П —Б–Є—А–µ–љ–∞ рЯЪ®
        scream: –Ъ—А–Є–Ї рЯШ±
        speech: –†–µ—З—М рЯЧ£пЄП
        yell: –Ъ—А–Є–Ї (–≥—А–Њ–Љ–Ї–Є–є) рЯУҐ
        cat_roar: –†—С–≤ –Ї–Њ—В–∞ рЯР±
