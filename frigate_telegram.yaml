blueprint:
  name: "Frigate вЖФ Telegram: —Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є—П –Є callback-–Ї–Њ–Љ–∞–љ–і—Л"
  description: >
    –Ю–±—К–µ–і–Є–љ—С–љ–љ–∞—П –∞–≤—В–Њ–Љ–∞—В–Є–Ј–∞—Ж–Є—П –і–ї—П –Њ—В–њ—А–∞–≤–Ї–Є —Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є–є Frigate –≤ Telegram
    –Є –Њ–±—А–∞–±–Њ—В–Ї–Є inline-–Ї–љ–Њ–њ–Њ–Ї (–≤–Є–і–µ–Њ, —Б–љ–Є–Љ–Ї–Є, live, —В—А–µ–≤–Њ–≥–∞, review).
  domain: automation
  input:
    frigate_base_url:
      name: Frigate URL
      description: "–С–∞–Ј–Њ–≤—Л–є URL Frigate (–љ–∞–њ—А–Є–Љ–µ—А: http://192.168.1.6:5000)"
      selector:
        text:
          type: url
      default: "http://192.168.1.6:5000"
    telegram_config_entry_id:
      name: Telegram Config Entry ID
      description: "ID –Є–љ—В–µ–≥—А–∞—Ж–Є–Є Telegram Bot –Є–Ј Home Assistant"
      selector:
        text:
      default: ""
    chat_ids:
      name: Chat IDs
      description: "–°–њ–Є—Б–Њ–Ї ID —З–∞—В–Њ–≤ Telegram —З–µ—А–µ–Ј –Ј–∞–њ—П—В—Г—О (–љ–∞–њ—А–Є–Љ–µ—А: 123456789,987654321)"
      selector:
        text:
      default: ""
    camera_entities:
      name: –Ъ–∞–Љ–µ—А—Л Frigate
      description: "–Т—Л–±–µ—А–Є—В–µ camera-—Б—Г—Й–љ–Њ—Б—В–Є Home Assistant, —Б–Њ–Њ—В–≤–µ—В—Б—В–≤—Г—О—Й–Є–µ –Ї–∞–Љ–µ—А–∞–Љ Frigate"
      selector:
        entity:
          multiple: true
          filter:
            - domain: camera
    verify_ssl:
      name: –Я—А–Њ–≤–µ—А—П—В—М SSL
      description: "–Ю—В–Ї–ї—О—З–Є—В–µ –і–ї—П –ї–Њ–Ї–∞–ї—М–љ—Л—Е URL –±–µ–Ј –≤–∞–ї–Є–і–љ–Њ–≥–Њ —Б–µ—А—В–Є—Д–Є–Ї–∞—В–∞"
      selector:
        boolean:
      default: false
    input_text_prefix:
      name: –Я—А–µ—Д–Є–Ї—Б input_text helpers
      description: "–Я—А–µ—Д–Є–Ї—Б –і–ї—П —Б–Њ–Ј–і–∞–љ–Є—П input_text helpers (–љ–∞–њ—А–Є–Љ–µ—А: frigate_tg_msg)"
      selector:
        text:
      default: "frigate_tg_msg"

# === –Я–Х–†–Х–Ь–Х–Э–Э–Ђ–Х –£–†–Ю–Т–Э–ѓ –Р–Т–Ґ–Ю–Ь–Р–Ґ–Ш–Ч–Р–¶–Ш–Ш ===
# –Ф–µ–ї–∞–µ–Љ blueprint inputs –і–Њ—Б—В—Г–њ–љ—Л–Љ–Є –≤ conditions –Є triggers
variables:
  camera_entities_list: !input camera_entities

# === –Ґ–†–Ш–У–У–Х–†–Ђ ===
triggers:
  # Frigate review-—Б–Њ–±—Л—В–Є—П (new / update / end)
  - trigger: mqtt
    options:
      topic: frigate/reviews
    id: frigate_review

  # Callback-–Ї–Њ–Љ–∞–љ–і—Л –Њ—В inline-–Ї–љ–Њ–њ–Њ–Ї Telegram
  - event_type: telegram_callback
    event_data:
      command: /send_video
    trigger: event
    id: send_video
  - event_type: telegram_callback
    event_data:
      command: /send_snapshot
    trigger: event
    id: send_snapshot
  - event_type: telegram_callback
    event_data:
      command: /send_live
    trigger: event
    id: send_live
  - event_type: telegram_callback
    event_data:
      command: /send_alarm
    trigger: event
    id: send_alarm
  - event_type: telegram_callback
    event_data:
      command: /send_review_preview
    trigger: event
    id: send_review_preview

# === –£–°–Ы–Ю–Т–Ш–ѓ ===
# –Ф–ї—П MQTT-—В—А–Є–≥–≥–µ—А–∞ вАФ —В–Њ–ї—М–Ї–Њ –Ї–∞–Љ–µ—А—Л –Є–Ј –±–µ–ї–Њ–≥–Њ —Б–њ–Є—Б–Ї–∞.
# –Ф–ї—П callback-—В—А–Є–≥–≥–µ—А–Њ–≤ —Г—Б–ї–Њ–≤–Є–µ –њ—А–Њ–њ—Г—Б–Ї–∞–µ—В—Б—П (–≤—Б–µ–≥–і–∞ true).
conditions:
  - condition: template
    value_template: >-
      {{ trigger.id != 'frigate_review' or
         ((trigger.payload_json | default({})).get('after', {}) | default({})).get('camera', '') in
         (camera_entities_list | default([]) | map('replace', 'camera.', '') | list) }}

# === –Ф–Х–Щ–°–Ґ–Т–Ш–ѓ ===
actions:
  # –Ю–±—Й–Є–µ –њ–µ—А–µ–Љ–µ–љ–љ—Л–µ (–±–µ–Ј–Њ–њ–∞—Б–љ—Л –і–ї—П –≤—Б–µ—Е —В–Є–њ–Њ–≤ —В—А–Є–≥–≥–µ—А–Њ–≤)
  - variables:
      frigate_base_url: !input frigate_base_url
      config_entry_id: !input telegram_config_entry_id
      chat_list: "{{ (chat_ids | default('')).split(',') | map('trim') | list }}"
      verify_ssl_input: !input verify_ssl
      object_name:
        person: —З–µ–ї–Њ–≤–µ–ЇрЯЩНвАНвЩВпЄП
        face: –ї–Є—Ж–ЊрЯІС
        car: –Љ–∞—И–Є–љ–∞рЯЪЧ
        motorcycle: –Љ–Њ—В–Њ—Ж–Є–Ї–їрЯПНпЄП
        bicycle: –≤–µ–ї–Њ—Б–Є–њ–µ–ірЯЪ≤
        boat: –ї–Њ–і–Ї–∞рЯЪ§
        license_plate: –љ–Њ–Љ–µ—А–љ–Њ–є –Ј–љ–∞–ЇрЯУЫ
        dog: —Б–Њ–±–∞–Ї–∞рЯРґ
        cat: –Ї–Њ—ВрЯР±
        deer: –Њ–ї–µ–љ—МрЯ¶М
        horse: –ї–Њ—И–∞–і—МрЯРі
        bird: –њ—В–Є—Ж–∞рЯР¶
        raccoon: –µ–љ–Њ—ВрЯ¶Э
        fox: –ї–Є—Б–∞рЯ¶К
        bear: –Љ–µ–і–≤–µ–і—МрЯРї
        cow: –Ї–Њ—А–Њ–≤–∞рЯРД
        squirrel: –±–µ–ї–Ї–∞рЯРњпЄП
        goat: –Ї–Њ–Ј–∞рЯРР
        rabbit: –Ї—А–Њ–ї–Є–ЇрЯРЗ
        package: –њ–Њ—Б—Л–ї–Ї–∞рЯУ¶
        waste_bin: –Љ—Г—Б–Њ—А–љ—Л–є –±–∞–ЇрЯЧСпЄП
        bbq_grill: –≥—А–Є–ї—МрЯНЦ
        robot_lawnmower: –≥–∞–Ј–Њ–љ–Њ–Ї–Њ—Б–Є–ї–Ї–∞-—А–Њ–±–Њ—ВрЯ§Ц
        umbrella: –Ј–Њ–љ—ВвШВпЄП
      camera_name:
        cam_1: –і–≤–Њ—А
        cam_2: –Њ–≥–Њ—А–Њ–і
        cam_3: —Г–ї–Є—Ж–∞
        cam_4: —Г–ї–Є—Ж–∞ 2
        cam_5: –Њ–≥–Њ—А–Њ–і 2
        cam_6: –≥–∞—А–∞–ґ
      severity_map:
        alert: рЯЪ® –Ґ–†–Х–Т–Ю–У–Р
        detection: вДєпЄП –Ю–±–љ–∞—А—Г–ґ–µ–љ–Є–µ
      zone_name:
        front_yard: –њ–µ—А–µ–і–љ–Є–є –і–≤–Њ—А
        driveway: –њ–Њ–і—К–µ–Ј–і
        garage: –≥–∞—А–∞–ґ
        backyard: –Ј–∞–і–љ–Є–є –і–≤–Њ—А
        street: —Г–ї–Є—Ж–∞
        entrance: –≤—Е–Њ–і
      audio_object:
        bark: –Ы–∞–є —Б–Њ–±–∞–Ї–Є рЯРґ
        fire_alarm: –Я–Њ–ґ–∞—А–љ–∞—П —Б–Є—А–µ–љ–∞ рЯЪ®
        scream: –Ъ—А–Є–Ї рЯШ±
        speech: –†–µ—З—М рЯЧ£пЄП
        yell: –Ъ—А–Є–Ї (–≥—А–Њ–Љ–Ї–Є–є) рЯУҐ
        cat_roar: –†—С–≤ –Ї–Њ—В–∞ рЯР±

  # === –Т–Х–Ґ–Т–Ы–Х–Э–Ш–Х: Frigate reviews vs Callback-–Ї–Њ–Љ–∞–љ–і—Л ===
  - choose:

      # === –Т–Х–Ґ–Ъ–Р 1: Frigate Reviews (—Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є—П new/update/end) ===
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'frigate_review' }}"
        sequence:
          - variables:
              review_id: "{{ trigger.payload_json['after']['id'] }}"
              id_data: >-
                {{ trigger.payload_json['after']['data']['detections'] | last |
                default(review_id) }}
              camera: "{{ trigger.payload_json['after']['camera'] }}"
              objects: "{{ trigger.payload_json['after']['data']['objects'] | default([]) }}"
              sub_labels: "{{ trigger.payload_json['after']['data']['sub_labels'] | default([]) }}"
              audio: "{{ trigger.payload_json['after']['data']['audio'] | default([]) }}"
              zones: "{{ trigger.payload_json['after']['data']['zones'] | default([]) }}"
              severity: "{{ trigger.payload_json['after']['severity'] | default('detection') }}"
              type: "{{ trigger.payload_json['type'] }}"
              start_time: "{{ trigger.payload_json['after']['start_time'] }}"
              end_time: "{{ trigger.payload_json['after']['end_time'] }}"
              thumb_path: "{{ trigger.payload_json['after']['thumb_path'] | default('') }}"
              message_template: |-
                {% set cam = camera_name[camera] | default(camera) %}
                *{{ severity_map[severity] | default('вЭУ') }}* \| *{{ cam }}*
                {%- if objects | length > 0 %}
                рЯСБ *–Ю–±—К–µ–Ї—В—Л:* {% for obj in objects %}{{ object_name[obj] | default('вЭУ') }}{% if sub_labels | length > 0 and loop.index0 < sub_labels | length and sub_labels[loop.index0] %} ({{ sub_labels[loop.index0] }}){% endif %}{% if not loop.last %}, {% endif %}{% endfor %}
                {%- else %}
                вЪ†пЄП *–Ю–±—К–µ–Ї—В—Л –љ–µ –Њ–±–љ–∞—А—Г–ґ–µ–љ—Л*
                {%- endif %}
                {%- if zones | length > 0 %}
                рЯОѓ *–Ч–Њ–љ—Л:* {% for z in zones %}{{ zone_name[z] | default(z) }}{% if not loop.last %}, {% endif %}{% endfor %}
                {%- endif %}
                {%- if audio | length > 0 %}
                рЯФК *–Ч–≤—Г–Ї–Є:* {% for sound in audio %}{{ audio_object[sound] | default('рЯФК –љ–µ–Є–Ј–≤–µ—Б—В–љ—Л–є') }}{% if not loop.last %}, {% endif %}{% endfor %}
                {%- endif %}
                {%- if end_time %}
                вП± *–Ф–ї–Є—В–µ–ї—М–љ–Њ—Б—В—М:* {{ (end_time - start_time) | int }} —Б–µ–Ї\.
                {%- else %}
                рЯФі *–°–Њ–±—Л—В–Є–µ –∞–Ї—В–Є–≤–љ–Њ*
                {%- endif %}
              input_text_prefix_safe: "{{ input_text_prefix | default('frigate_tg_msg') }}"
              input_text_entity: "input_text.{{ input_text_prefix_safe }}_{{ camera }}"
              stored_ids: "{{ states(input_text_entity) | default('') }}"
              stored_pairs: "{{ stored_ids.split(',') if stored_ids and stored_ids != 'unknown' else [] }}"

          - alias: NEW
            if:
              - alias: NEW ?
                condition: template
                value_template: "{{ type == 'new' }}"
            then:
              - continue_on_error: true
                action: telegram_bot.send_animation
                data:
                  caption: "{{ message_template }}"
                  parse_mode: markdownv2
                  url: >-
                    {{ frigate_base_url }}/api/{{ camera }}/start/{{ start_time
                    }}/end/{{ now().timestamp() }}/preview.gif
                  inline_keyboard:
                    - "рЯФі Live:/send_live {{ camera }}, рЯЪ® –Ґ—А–µ–≤–Њ–≥–∞:/send_alarm {{ camera }} {{ id_data }}"
                  chat_id: "{{ chat_list }}"
                  verify_ssl: "{{ verify_ssl_input }}"
                  config_entry_id: "{{ config_entry_id }}"
                response_variable: telegram_response
              - if:
                  - condition: template
                    value_template: "{{ telegram_response is defined and telegram_response.chats is defined }}"
                then:
                  - action: input_text.set_value
                    data:
                      entity_id: "{{ input_text_entity }}"
                      value: >-
                        {% for chat in telegram_response.chats %}{{ chat.chat_id }}:{{ chat.message_id }}{% if not loop.last %},{% endif %}{% endfor %}

          - alias: UPDATE
            if:
              - alias: UPDATE ?
                condition: template
                value_template: "{{ type == 'update' }}"
            then:
              - if:
                  - condition: template
                    value_template: "{{ stored_pairs | length > 0 }}"
                then:
                  - repeat:
                      for_each: "{{ stored_pairs }}"
                      sequence:
                        - variables:
                            pair_parts: "{{ repeat.item.split(':') }}"
                            upd_chat_id: "{{ pair_parts[0] }}"
                            upd_message_id: "{{ pair_parts[1] }}"
                        - continue_on_error: true
                          action: telegram_bot.edit_caption
                          data:
                            chat_id: "{{ upd_chat_id }}"
                            message_id: "{{ upd_message_id }}"
                            caption: "{{ message_template }}"
                            parse_mode: markdownv2

          - alias: END
            if:
              - alias: END ?
                condition: template
                value_template: "{{ type == 'end' }}"
            then:
              - if:
                  - condition: template
                    value_template: "{{ stored_pairs | length > 0 }}"
                then:
                  - repeat:
                      for_each: "{{ stored_pairs }}"
                      sequence:
                        - variables:
                            pair_parts: "{{ repeat.item.split(':') }}"
                            end_chat_id: "{{ pair_parts[0] }}"
                            end_message_id: "{{ pair_parts[1] }}"
                        - continue_on_error: true
                          action: telegram_bot.edit_caption
                          data:
                            chat_id: "{{ end_chat_id }}"
                            message_id: "{{ end_message_id }}"
                            caption: "{{ message_template }}"
                            parse_mode: markdownv2
                        - continue_on_error: true
                          action: telegram_bot.edit_replymarkup
                          data:
                            chat_id: "{{ end_chat_id }}"
                            message_id: "{{ end_message_id }}"
                            inline_keyboard:
                              - "рЯУЉ –Т–Є–і–µ–Њ:/send_video {{ camera }} {{ start_time }} {{ end_time }}, рЯУЄ –§–Њ—В–Њ:/send_snapshot {{ id_data }}"
                              - "рЯФі Live:/send_live {{ camera }}"
              - action: input_text.set_value
                data:
                  entity_id: "{{ input_text_entity }}"
                  value: ""

      # === –Т–Х–Ґ–Ъ–Р 2: Callback-–Ї–Њ–Љ–∞–љ–і—Л Telegram ===
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.id in ['send_video', 'send_snapshot', 'send_live',
              'send_alarm', 'send_review_preview'] }}
        sequence:
          - variables:
              chat_id: "{{ trigger.event.data.chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              callback_query_id: "{{ trigger.event.data.callback_query_id }}"
              camera: >-
                {{ trigger.event.data.args[0] if trigger.id in
                ['send_video', 'send_live', 'send_alarm', 'send_review_preview'] else none }}
              start_time: "{{ trigger.event.data.args[1] if trigger.id == 'send_video' else none }}"
              end_time: "{{ trigger.event.data.args[2] if trigger.id == 'send_video' else none }}"
              event_id: >-
                {{ trigger.event.data.args[0] if trigger.id == 'send_snapshot' else
                (trigger.event.data.args[1] if trigger.id == 'send_alarm' else
                (trigger.event.data.args[1] if trigger.id == 'send_review_preview' else none)) }}
              review_id: "{{ trigger.event.data.args[0] if trigger.id == 'send_review_preview' else none }}"

          - choose:
              # /send_video
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.id == 'send_video' }}"
                sequence:
                  - continue_on_error: true
                    action: telegram_bot.send_video
                    data:
                      url: >-
                        {{ frigate_base_url }}/api/{{ camera }}/start/{{ start_time
                        }}/end/{{ end_time }}/clip.mp4
                      chat_id: "{{ chat_id }}"
                      parse_mode: markdownv2
                      verify_ssl: "{{ verify_ssl_input }}"
                      config_entry_id: "{{ config_entry_id }}"
                  - continue_on_error: true
                    action: telegram_bot.answer_callback_query
                    data:
                      message: "рЯУЉ –Т–Є–і–µ–Њ –Њ—В–њ—А–∞–≤–ї–µ–љ–Њ"
                      callback_query_id: "{{ callback_query_id }}"

              # /send_snapshot
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.id == 'send_snapshot' }}"
                sequence:
                  - continue_on_error: true
                    action: telegram_bot.send_photo
                    data:
                      url: >-
                        {{ frigate_base_url }}/api/events/{{ event_id
                        }}/snapshot-clean.webp
                      chat_id: "{{ chat_id }}"
                      verify_ssl: "{{ verify_ssl_input }}"
                      parse_mode: markdownv2
                      config_entry_id: "{{ config_entry_id }}"
                  - continue_on_error: true
                    action: telegram_bot.answer_callback_query
                    data:
                      message: "рЯУЄ –°–љ–Є–Љ–Њ–Ї –Њ—В–њ—А–∞–≤–ї–µ–љ"
                      callback_query_id: "{{ callback_query_id }}"

              # /send_live
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.id == 'send_live' }}"
                sequence:
                  - continue_on_error: true
                    action: telegram_bot.send_message
                    data:
                      message: >-
                        рЯФі [Live view {{ camera_name[camera] | default(camera)
                        }}]({{ frigate_base_url }}/cameras/{{ camera }})
                      chat_id: "{{ chat_id }}"
                      parse_mode: markdownv2
                      verify_ssl: "{{ verify_ssl_input }}"
                      config_entry_id: "{{ config_entry_id }}"
                  - continue_on_error: true
                    action: telegram_bot.answer_callback_query
                    data:
                      message: "рЯФі Live view –Њ—В–њ—А–∞–≤–ї–µ–љ"
                      callback_query_id: "{{ callback_query_id }}"

              # /send_alarm
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.id == 'send_alarm' }}"
                sequence:
                  - continue_on_error: true
                    action: telegram_bot.send_photo
                    data:
                      url: >-
                        {{ frigate_base_url }}/api/events/{{ event_id
                        }}/snapshot-clean.webp
                      caption: >-
                        рЯЪ® *–Ґ–†–Х–Т–Ю–У–Р\!* –Я–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Њ –Њ–±–љ–∞—А—Г–ґ–µ–љ–Є–µ –љ–∞ –Ї–∞–Љ–µ—А–µ *{{ camera_name[camera] | default(camera) }}*
                      chat_id: "{{ chat_id }}"
                      verify_ssl: "{{ verify_ssl_input }}"
                      parse_mode: markdownv2
                      config_entry_id: "{{ config_entry_id }}"
                  - continue_on_error: true
                    action: telegram_bot.answer_callback_query
                    data:
                      message: "рЯЪ® –Ґ—А–µ–≤–Њ–≥–∞ –Њ—В–њ—А–∞–≤–ї–µ–љ–∞"
                      callback_query_id: "{{ callback_query_id }}"

              # /send_review_preview
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.id == 'send_review_preview' }}"
                sequence:
                  - continue_on_error: true
                    action: telegram_bot.send_video
                    data:
                      url: >-
                        {{ frigate_base_url }}/api/review/{{ review_id }}/preview
                      chat_id: "{{ chat_id }}"
                      parse_mode: markdownv2
                      verify_ssl: "{{ verify_ssl_input }}"
                      config_entry_id: "{{ config_entry_id }}"
                      caption: "рЯУЉ Review preview –і–ї—П {{ camera_name[camera] | default(camera) }}"
                  - continue_on_error: true
                    action: telegram_bot.answer_callback_query
                    data:
                      message: "рЯУЉ Review preview –Њ—В–њ—А–∞–≤–ї–µ–љ"
                      callback_query_id: "{{ callback_query_id }}"

mode: parallel
max: 20
max_exceeded: silent
